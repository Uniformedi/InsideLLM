# Data Connector — shared catalog actions (tenant_id: core)
#
# Wraps configs/open-webui/data-connector-tool.py. Read-through SQL/API
# data sources configured in the Governance Hub's connectors registry.
# Every query is RBAC-gated upstream — these actions inherit that gate.
#
# P1.3 — InsideLLM Declarative Agent Platform

schema_version: "1.0"
actions:
  - schema_version: "1.0"
    action_id: dataconnector_list_sources
    tenant_id: core
    display_name: "Data Connector — List Sources"
    description: "List registered read-only data connectors (name, type, allowed groups, last-used)."
    category: retrieve
    backend:
      type: fastapi_http
      url: "http://governance-hub:8090/api/v1/connectors"
      method: GET
      timeout_ms: 5000
    inputs: {}
    outputs:
      connectors:
        type: array
    guardrail_requirements:
      minimum_guardrail_tier: tier_general_business
      data_classes: []
      requires_approval: false
    audit:
      log_inputs: false
      log_outputs: true
      redact_fields: []
    rate_limit:
      per_minute: 60
      per_day: 5000
    maintainer: insidellm-core
    version: "1.0.0"

  - schema_version: "1.0"
    action_id: dataconnector_query_source
    tenant_id: core
    display_name: "Data Connector — Query"
    description: "Execute a parameterized, read-only query against a registered connector. Injection-safe by construction — raw SQL is never accepted."
    category: retrieve
    backend:
      type: fastapi_http
      url: "http://governance-hub:8090/api/v1/connectors/{connector_id}/query"
      method: POST
      timeout_ms: 20000
    inputs:
      connector_id:
        type: integer
        required: true
        description: "ID of the registered connector."
      query_name:
        type: string
        required: true
        description: "Named, pre-approved query template on the connector."
      params:
        type: object
        required: false
        description: "Parameter bindings for the query template."
    outputs:
      rows:
        type: array
      metadata:
        type: object
        description: "Row count + query name echo."
    guardrail_requirements:
      # Financial is the realistic default for a collections/ops agent;
      # tenants that route PHI through connectors should override to HIPAA
      # at the tenant_id level.
      minimum_guardrail_tier: tier_financial_regulated
      data_classes: [financial]
      requires_approval: false
    audit:
      log_inputs: true
      log_outputs: true
      redact_fields: [rows]
    rate_limit:
      per_minute: 30
      per_day: 500
    maintainer: insidellm-core
    version: "1.0.0"

  - schema_version: "1.0"
    action_id: dataconnector_check_access
    tenant_id: core
    display_name: "Data Connector — Check Access"
    description: "Report whether the current caller has access to a given connector (does NOT execute any queries)."
    category: retrieve
    backend:
      type: fastapi_http
      url: "http://governance-hub:8090/api/v1/connectors/{connector_id}/my-access"
      method: GET
      timeout_ms: 3000
    inputs:
      connector_id:
        type: integer
        required: true
    outputs:
      access:
        type: object
        description: "{allowed: bool, groups: [...], reason: str}."
    guardrail_requirements:
      minimum_guardrail_tier: tier_general_business
      data_classes: []
      requires_approval: false
    audit:
      log_inputs: true
      log_outputs: true
      redact_fields: []
    rate_limit:
      per_minute: 60
      per_day: 2000
    maintainer: insidellm-core
    version: "1.0.0"

  - schema_version: "1.0"
    action_id: dataconnector_view_history
    tenant_id: core
    display_name: "Data Connector — Query History"
    description: "View recent query-execution history (user, connector, query_name, row count, timestamp). Query results themselves are redacted."
    category: retrieve
    backend:
      type: fastapi_http
      url: "http://governance-hub:8090/api/v1/connectors/{connector_id}/history"
      method: GET
      timeout_ms: 5000
    inputs:
      connector_id:
        type: integer
        required: false
        default: 0
        description: "Connector ID; 0 or omitted returns history across all connectors."
    outputs:
      history:
        type: array
    guardrail_requirements:
      minimum_guardrail_tier: tier_general_business
      data_classes: []
      requires_approval: false
    audit:
      log_inputs: true
      log_outputs: true
      redact_fields: []
    rate_limit:
      per_minute: 60
      per_day: 2000
    maintainer: insidellm-core
    version: "1.0.0"
