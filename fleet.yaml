# ============================================================================
# InsideLLM Fleet Manifest
# ============================================================================
# Render to per-VM terraform.tfvars files via:
#     pwsh ./scripts/Render-Fleet.ps1 -ManifestPath ./fleet.yaml
#
# Then deploy the whole fleet via:
#     pwsh ./scripts/Deploy-Fleet.ps1
#
# ----------------------------------------------------------------------------
# Top-level sections
# ----------------------------------------------------------------------------
#   shared:        settings common to every VM
#   edge:          (optional) front-door router topology (VIP + domain + TLS)
#   departments:   (optional) dept -> backend vm_name mapping, with fallback
#   instances:     per-VM overrides (vm_name is required)
#
# When `edge:` and `departments:` are present, Render-Fleet.ps1 auto-assigns
# `vm_role` and `department` to each instance based on references:
#   - a vm_name listed in departments.<dept>.backend  -> vm_role = "gateway"
#   - an IP listed in edge.vms                         -> vm_role = "edge"
#   - otherwise the first non-edge/non-workstation VM  -> vm_role = "primary"
# An explicit `vm_role` on an instance always wins over inference.
#
# ----------------------------------------------------------------------------
# Precedence
# ----------------------------------------------------------------------------
# Keys under `shared:` apply to every VM. Keys under an `instances:` block
# override `shared` for that single VM. Instance wins on conflict.
#
# ----------------------------------------------------------------------------
# Secrets via environment variables
# ----------------------------------------------------------------------------
# Any value of the form  env:VAR_NAME  is resolved from the process
# environment at render time. The renderer fails hard if the env var is unset.
# Recommended env vars:
#     FLEET_AD_PASSWORD       - AD join password (maps to ad_join_password)
#     FLEET_MSSQL_PASSWORD    - Central fleet MSSQL password
#                               (maps to governance_hub_central_db_password)
#     FLEET_ANTHROPIC_KEY     - Shared Anthropic key (if all VMs share one key,
#                               set this in shared; omit per-instance overrides)
#
# ----------------------------------------------------------------------------
# Terraform variable mapping
# ----------------------------------------------------------------------------
# Every key here maps 1:1 to a variable in terraform/variables.tf.
# Any variable from terraform/variables.tf may appear under `shared` or
# inside an `instances` block. See docs/DefaultDeployment.md or
# html/DefaultDeployment.html for the full list of variables and defaults.
# ============================================================================

shared:
  # --- Hyper-V host -----------------------------------------------------------
  # WinRM connection to the Windows host running Hyper-V.
  hyperv_user:     "DOMAIN\\Administrator"   # e.g. "uniformedi\\dmedina"
  hyperv_password: "env:FLEET_HYPERV_PASSWORD"
  hyperv_host:     "127.0.0.1"               # localhost if running on the Hyper-V host
  hyperv_port:     5985
  hyperv_https:    false
  hyperv_insecure: true

  # --- VM hardware defaults ---------------------------------------------------
  # Override per-instance for VMs that need more/less resources.
  vm_processor_count:      8
  vm_memory_startup_bytes: 34359738368       # 32 GB (reduce to 8589934592 without Ollama)
  vm_disk_size_bytes:      85899345920       # 80 GB
  vm_path:          "C:\\HyperV\\VMs"
  vm_vhd_path:      "C:\\HyperV\\VHDs"
  base_vhdx_source: "C:\\HyperV\\Images\\debian-12-genericcloud-amd64.vhdx"

  # --- VM networking ----------------------------------------------------------
  vm_switch_name:  "InsideLLM"
  vm_switch_type:  "External"                # "External" for LAN access; "Internal" for isolated
  # vm_switch_adapter: "Ethernet"            # required when vm_switch_type = External
  vm_gateway:      "10.0.0.1"
  vm_dns_servers:  ["10.0.0.10", "8.8.8.8", "8.8.4.4"]   # replace with DC IP for AD: ["10.0.0.10"]
  vm_domain:       "local"                   # e.g. "uniformedi.local" for AD environments

  # --- SSH --------------------------------------------------------------------
  ssh_public_key_path: "~/.ssh/id_rsa.pub"
  ssh_admin_user:      "insidellm-admin"

  # --- LLM providers ---------------------------------------------------------
  # Set the shared key here OR override per-instance below.
  anthropic_api_key: "env:FLEET_ANTHROPIC_KEY"
  # openai_api_key:  ""
  # gemini_api_key:  ""
  # mistral_api_key: ""

  # --- Active Directory (optional) --------------------------------------------
  # Set ad_domain_join: true + provide credentials to join VMs to the domain.
  ad_domain_join:    false
  # ad_join_user:      "Administrator"
  # ad_join_password:  "env:FLEET_AD_PASSWORD"
  # dc_dns_servers:    ["10.0.0.10"]

  # --- Gov-Hub RBAC -----------------------------------------------------------
  ad_admin_groups:    "InsideLLM-Admin"
  ad_view_groups:     "InsideLLM-View"
  ad_approver_groups: "InsideLLM-Approve"

  # --- SSO (optional) ---------------------------------------------------------
  # sso_provider: "azure_ad"                 # "azure_ad", "okta", or "" (none)
  # azure_ad_client_id:     ""
  # azure_ad_client_secret: "env:FLEET_AZURE_SECRET"
  # azure_ad_tenant_id:     ""

  # --- Central Fleet DB (optional) --------------------------------------------
  #  Enables fleet-wide governance sync. All VMs push to this central DB.
  governance_hub_central_db_type:     "mssql"    # mssql | mariadb | postgres
  governance_hub_central_db_host:     "10.0.0.6"
  governance_hub_central_db_port:     1433
  governance_hub_central_db_name:     "insidellm_central"
  governance_hub_central_db_user:     "insidellm_sync"
  governance_hub_central_db_password: "env:FLEET_MSSQL_PASSWORD"

  # --- Optional services ------------------------------------------------------
  governance_hub_enable:   true
  docforge_enable:         true
  ops_grafana_enable:      true
  ops_uptime_kuma_enable:  true
  # chat_enable:           false             # Mattermost team chat
  # ollama_enable:         false             # local LLM inference

  # --- Policy -----------------------------------------------------------------
  policy_engine_enable: true
  governance_tier:      "tier1"
  industry:             "general"
  data_classification:  "confidential"

  # --- Budgets & rate limits (fleet-wide defaults) ----------------------------
  # These apply to every VM unless overridden per-instance below.
  litellm_global_max_budget:    100          # monthly cap in USD (0 = unlimited)
  litellm_default_user_budget:  5.0          # per-user daily cap in USD
  litellm_default_user_rpm:     30           # requests per minute per user
  litellm_default_user_tpm:     100000       # tokens per minute per user

  # --- DLP --------------------------------------------------------------------
  dlp_enable:       true
  dlp_mode:         "block"                  # "block" or "redact"
  # dlp_custom_patterns: ""

  # --- Environment label ------------------------------------------------------
  environment: "production"
  owner:       "Uniformedi"

# ============================================================================
# Edge — front-door router (optional)
# ----------------------------------------------------------------------------
# The edge VM terminates TLS for `edge.domain`, owns the keepalived VIP, and
# routes incoming requests to the correct department backend based on the
# authenticated user's OIDC claim (or LDAP group). It is the *only* VM that
# sees public / LAN client traffic — backends are reachable only from the
# edge subnet.
#
# HA: list two IPs under `edge.vms` to get a keepalived active/passive pair
# that share the `vip`. The first entry is the initial MASTER.
# ============================================================================

edge:
  vms:
    - 10.0.0.100                             # primary edge VM IP (MASTER)
    # - 10.0.0.101                           # optional secondary for keepalived HA
  vip: 192.168.100.109                             # virtual IP owned by keepalived on the active edge
  domain: insidellm.corp.example.com         # FQDN served by the edge (TLS CN, OIDC redirect_uri)
  tls_source: self-signed                    # self-signed | letsencrypt | custom
  # tls_cert_path: /etc/ssl/corp.crt         # only when tls_source = custom
  # tls_key_path:  /etc/ssl/corp.key         # only when tls_source = custom

# ============================================================================
# Departments — OIDC-claim / LDAP-group to backend routing
# ----------------------------------------------------------------------------
# Each key is a department identifier (must match the claim value set in your
# IdP). `backend` is a vm_name from `instances:` below — the edge proxies
# matching users to that VM. `fallback` is an optional sibling department
# whose backend the edge uses if the primary backend is down; omit for
# fail-fast behavior (recommended for regulated departments like legal).
# ============================================================================

departments:
  engineering:
    backend: insidellm-gateway                   # eng users -> insidellm-gateway
    fallback: insidellm-gen                  # if eng is down, route to general pool

  legal:
    backend: insidellm-legal                 # legal users -> insidellm-legal
    # no fallback — legal enforces its own DLP overlay; do not cross-route

  client-service:
    backend: insidellm-clientsrvc
    fallback: insidellm-gen

  exec:
    backend: insidellm-primary

# ============================================================================
# Instances — one entry per VM to deploy.
# Every terraform/variables.tf key can appear here to override the shared value.
# At minimum, provide: vm_name, vm_static_ip (or leave blank for DHCP).
#
# Role inference (when edge: / departments: are present):
#   - vm_role, department, fallback_department are set automatically from
#     the references above unless explicitly overridden on the instance.
#
# Budget strategy:
#   - Shared instances (many teams, broad access)  -> higher global budget, moderate per-user
#   - Department-specific instances                 -> tighter global cap, team-appropriate rates
#   - Management / exec instances                   -> low request volume, higher per-request token budget
#   - Dev / sandbox instances                       -> generous limits for experimentation
# ============================================================================

instances:
  # --- Fleet primary (Gov-Hub, Grafana, Loki, central sync target) -----------
  # vm_role is auto-set to "primary" for the first non-edge / non-gateway VM
  # that does not declare its own role. All other VMs in the fleet get their
  # `fleet_primary_host` pointed at this VM's static IP.
  - vm_name:      "insidellm-gen"
    vm_hostname:  "insidellm-gen"
    vm_static_ip: "192.168.100.110/24"
    vm_role:      "primary"                  # explicit — wins over inference
    litellm_global_max_budget:   300
    litellm_default_user_budget: 5.0
    litellm_default_user_rpm:    30
    litellm_default_user_tpm:    120000

  # --- Engineering gateway backend -------------------------------------------
  # Referenced by departments.engineering.backend -> auto vm_role = "gateway"
  # auto department = "engineering", auto fallback_department = "general"
  - vm_name:      "insidellm-gateway"
    vm_hostname:  "insidellm-gateway"
    vm_static_ip: "10.0.0.120/24"
    litellm_global_max_budget:   500         # eng burns tokens fast
    litellm_default_user_budget: 10.0
    litellm_default_user_rpm:    60
    litellm_default_user_tpm:    200000

  # --- Legal gateway backend (tier2, no fallback) ----------------------------
  # Referenced by departments.legal.backend -> auto vm_role = "gateway"
  - vm_name:      "insidellm-legal"
    vm_hostname:  "insidellm-legal"
    vm_static_ip: "10.0.0.121/24"
    industry:        "legal"
    governance_tier: "tier2"
    litellm_global_max_budget:   150
    litellm_default_user_budget: 4.0
    litellm_default_user_rpm:    20
    litellm_default_user_tpm:    150000

  # --- Client-service gateway backend (collections industry overlay) ---------
  - vm_name:      "insidellm-clientsrvc"
    vm_hostname:  "insidellm-clientsrvc"
    vm_static_ip: "10.0.0.124/24"
    industry:        "collections"
    governance_tier: "tier2"
    litellm_global_max_budget:   200
    litellm_default_user_budget: 2.0
    litellm_default_user_rpm:    20
    litellm_default_user_tpm:    80000

  # --- Exec / management gateway backend -------------------------------------
  - vm_name:      "insidellm-primary"
    vm_hostname:  "insidellm-primary"
    vm_static_ip: "10.0.0.122/24"
    litellm_global_max_budget:   50
    litellm_default_user_budget: 3.0
    litellm_default_user_rpm:    15
    litellm_default_user_tpm:    150000

  # --- Edge front-door router ------------------------------------------------
  # IP matches edge.vms[0] above -> auto vm_role = "edge". The renderer
  # propagates edge.domain / edge.vip / edge.tls_source from the top-level
  # edge: block into this instance's tfvars.
  - vm_name:      "insidellm-edge"
    vm_hostname:  "insidellm-edge"
    vm_static_ip: "10.0.0.100/24"
    vm_processor_count:      4               # edge is a thin router; no Ollama
    vm_memory_startup_bytes: 8589934592      # 8 GB
    governance_hub_enable: false             # no local governance; points at primary
    docforge_enable:       false
    ollama_enable:         false
